<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>CSS Exercise 02 - Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="color-bg-blue">
    <main class="form-container">
      <form action="" class="ira-form">
        <h1 class="main-heading-form">Roth IRA Calculator</h1>
        <div class="form-element">
          <label class="form-label" for="balance">Balances ($)</label>
          <input class="form-input" type="text" id="balance" name="balance" />
        </div>
        <div class="form-element">
          <label class="form-label" for="annual-contribution"
            >Annual contribution ($)</label
          >
          <input
            class="form-input"
            type="text"
            id="annual-contribution"
            name="annual-contribution"
          />
        </div>
        <fieldset>
          <legend>Maximize contribution?</legend>
          <div class="form-radios">
            <input type="radio" id="yes" name="max-contribution" value="yes" />
            <label for="yes">Yes</label>

            <input type="radio" id="no" name="max-contribution" value="no" />
            <label for="no">No</label>
          </div>
        </fieldset>
        <div class="form-element">
          <label class="form-label" for="rate"
            >Expected rate of returns (%)</label
          >

          <input class="form-input" type="number" value="" id="rate" />
        </div>
        <div class="form-element">
          <label class="form-label" for="age">Current age</label>
          <input class="form-input" type="number" name="age" id="age" />
        </div>
        <div class="form-element">
          <label class="form-label" for="retirement">Retirement age</label>
          <input
            class="form-input"
            type="number"
            name="retirement"
            id="retirement"
          />
        </div>
        <div class="form-element">
          <label class="form-label" for="tax">Marginal tax rate(%)</label>
          <input class="form-input" type="number" name="tax" id="tax" />
        </div>
        <div class="form-element">
          <button class="btn btn-submit" type="submit" value="Submit">
            Calculate
          </button>
          <button class="btn btn-reset" type="reset" value="Reset">
            Reset
          </button>
        </div>

        <p class="form-note">
          This exercise is a simplified version of the Roth IRA Calculator at
          <a href="https://www.calculator.net/roth-ira-calculator.html"
            >Calculatore.net</a
          >
        </p>
      </form>
    </main>
  </body>
</html>
